server:
  port: 8888

spring:
  main:
    web-application-type: reactive
  application:
    name: gateway-server
  cloud:
    nacos:
      discovery:
        ip: 127.0.0.1
        server-addr: localhost:8848
        username: nacos
        password: nacos
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # 👇 4个服务完整路由
      routes:
        # 公告服务
        - id: notice-service
          uri: lb://notice-service
          predicates:
            - Path=/api/notice/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}

        # 商品服务
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/product/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}

        # 用户服务
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}

        # 订单服务
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}

      # 全局跨域
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true